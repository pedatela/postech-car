# TESTE
name: CI-CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      action:
        description: "Choose 'destroy' to derrubar toda a infra"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - destroy

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: postech-car
  TF_WORKING_DIR: terraform

jobs:
  lint_test:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.action != 'destroy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm test

  build_and_push:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.action != 'destroy'
    needs: lint_test
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.export.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
      - name: Terraform Init (ensure ECR)
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" -backend-config="key=${{ secrets.TF_STATE_KEY }}" -backend-config="region=${{ env.AWS_REGION }}" -backend-config="dynamodb_table=${{ secrets.TF_STATE_DYNAMODB_TABLE }}"
      - name: Terraform apply (ECR only)
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} apply -target=aws_ecr_repository.app -auto-approve
      - name: Login to Amazon ECR
        id: ecr-login
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
        run: |
          aws ecr get-login-password | docker login --username AWS --password-stdin $ECR_REGISTRY
          echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_ENV
      - name: Build image
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG} .
      - name: Push image
        run: |
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}
      - name: Export image tag
        id: export
        run: echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

  deploy_infra:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.action != 'destroy'
    needs: build_and_push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
      - name: Set ECR registry env
        run: echo "ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_ENV
      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" -backend-config="key=${{ secrets.TF_STATE_KEY }}" -backend-config="region=${{ env.AWS_REGION }}" -backend-config="dynamodb_table=${{ secrets.TF_STATE_DYNAMODB_TABLE }}"
      - name: Terraform Fmt
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} fmt -check
      - name: Terraform Validate
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} validate
      - name: Terraform Plan
        env:
          IMAGE_URI: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} plan -out=tfplan -var container_image=$IMAGE_URI
      - name: Terraform Apply
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} apply -auto-approve tfplan

  destroy_infra:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" -backend-config="key=${{ secrets.TF_STATE_KEY }}" -backend-config="region=${{ env.AWS_REGION }}" -backend-config="dynamodb_table=${{ secrets.TF_STATE_DYNAMODB_TABLE }}"
      - name: Terraform Plan (destroy)
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} plan -destroy -out=tfplan-destroy
      - name: Terraform Destroy
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} apply -auto-approve tfplan-destroy
